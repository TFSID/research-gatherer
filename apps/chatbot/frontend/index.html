<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ResearchGPT · Chat Interface</title>
<style>
  /* === Reset & Base === */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface-hover: #1c2333;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --accent-glow: rgba(88,166,255,0.15);
    --green: #3fb950;
    --orange: #d29922;
    --red: #f85149;
    --radius: 12px;
    --radius-sm: 8px;
    --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    --mono: 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace;
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* === App Layout === */
  .app-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* === Sidebar === */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }
  .sidebar-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .sidebar-header h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .sidebar-actions {
    display: flex;
    gap: 4px;
  }
  .sidebar-actions button {
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text-dim);
    cursor: pointer;
    padding: 4px 8px;
    font-size: 13px;
    transition: all 0.15s;
  }
  .sidebar-actions button:hover {
    background: var(--surface-hover);
    color: var(--text);
    border-color: var(--accent);
  }
  .sidebar-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }
  .sidebar-list::-webkit-scrollbar { width: 4px; }
  .sidebar-list::-webkit-scrollbar-track { background: transparent; }
  .sidebar-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .session-item {
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s;
    margin-bottom: 2px;
    border: 1px solid transparent;
  }
  .session-item:hover {
    background: var(--surface-hover);
  }
  .session-item.active {
    background: var(--accent-glow);
    border-color: rgba(88,166,255,0.3);
  }
  .session-item .session-title {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .session-item .session-meta {
    font-size: 11px;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
  }
  .session-item .delete-btn {
    opacity: 0;
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    font-size: 14px;
    padding: 0 4px;
    transition: opacity 0.15s;
  }
  .session-item:hover .delete-btn {
    opacity: 1;
  }

  .loading-sessions {
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    padding: 20px;
  }

  /* === Main Chat Area === */
  .main-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* === Header === */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  header h1 .badge {
    font-size: 10px;
    font-weight: 500;
    background: var(--accent-glow);
    color: var(--accent);
    padding: 2px 8px;
    border-radius: 99px;
    border: 1px solid rgba(88,166,255,0.3);
  }
  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    margin-right: 6px;
  }
  .status-dot.disconnected { background: var(--orange); }

  /* === Config Bar === */
  .config-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .config-bar label {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .config-bar input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--mono);
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  .config-bar input:focus { border-color: var(--accent); }
  .config-bar input::placeholder { color: var(--text-dim); opacity: 0.5; }
  .config-bar .stream-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
  }
  .config-bar .stream-toggle input[type="checkbox"] {
    appearance: none;
    width: 36px; height: 20px;
    background: var(--border);
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .config-bar .stream-toggle input[type="checkbox"]::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: transform 0.2s, background 0.2s;
  }
  .config-bar .stream-toggle input[type="checkbox"]:checked {
    background: var(--accent);
  }
  .config-bar .stream-toggle input[type="checkbox"]:checked::after {
    transform: translateX(16px);
    background: #fff;
  }
  .config-bar .save-config-btn {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .config-bar .save-config-btn:hover { opacity: 0.85; }

  /* === BYOK toggle === */
  .byok-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    font-size: 12px;
    color: var(--text-dim);
  }
  .byok-toggle input[type="checkbox"] {
    appearance: none;
    width: 36px; height: 20px;
    background: var(--border);
    border-radius: 10px;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .byok-toggle input[type="checkbox"]::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: var(--text-dim);
    transition: transform 0.2s, background 0.2s;
  }
  .byok-toggle input[type="checkbox"]:checked {
    background: var(--accent);
  }
  .byok-toggle input[type="checkbox"]:checked::after {
    transform: translateX(16px);
    background: #fff;
  }
  .byok-toggle .key-icon { font-size: 14px; }

  /* === BYOK fields === */
  .byok-fields {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 8px 20px;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    flex-shrink: 0;
  }
  .byok-fields.active { display: flex; }
  .byok-fields label {
    font-size: 12px;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .byok-fields input {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 4px 10px;
    color: var(--text);
    font-size: 13px;
    font-family: var(--mono);
    width: 200px;
    outline: none;
    transition: border-color 0.2s;
  }
  .byok-fields input:focus { border-color: var(--accent); }
  .byok-fields input::placeholder { color: var(--text-dim); opacity: 0.5; }
  .byok-fields .badge-byok {
    font-size: 10px;
    font-weight: 500;
    background: rgba(61,209,121,0.15);
    color: #3dd179;
    padding: 2px 8px;
    border-radius: 99px;
    border: 1px solid rgba(61,209,121,0.3);
    white-space: nowrap;
  }

  /* === Chat Container === */
  .chat-container {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .chat-container::-webkit-scrollbar { width: 6px; }
  .chat-container::-webkit-scrollbar-track { background: transparent; }
  .chat-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* === Messages === */
  .msg {
    max-width: 780px;
    width: fit-content;
    animation: fadeIn 0.25s ease;
  }
  .msg.user { align-self: flex-end; }
  .msg.assistant { align-self: flex-start; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.6;
    font-size: 14px;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }
  .msg.user .msg-bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .msg-label {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 4px;
    padding: 0 4px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .msg.user .msg-label { text-align: right; }

  /* === Markdown-like rendering === */
  .msg-bubble p { margin: 0 0 8px; }
  .msg-bubble p:last-child { margin-bottom: 0; }
  .msg-bubble strong { color: #fff; font-weight: 600; }
  .msg.assistant .msg-bubble strong { color: var(--accent); }
  .msg-bubble code {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: var(--mono);
    font-size: 13px;
  }
  .msg-bubble pre {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: var(--mono);
    font-size: 13px;
  }
  .msg-bubble a {
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
  }
  .msg-bubble a:hover { text-decoration: underline; }
  .msg-bubble ul, .msg-bubble ol { padding-left: 20px; margin: 6px 0; }
  .msg-bubble li { margin: 2px 0; }
  .msg-bubble h1, .msg-bubble h2, .msg-bubble h3 { margin: 12px 0 6px; color: var(--accent); }
  .msg-bubble h1 { font-size: 16px; }
  .msg-bubble h2 { font-size: 15px; }
  .msg-bubble h3 { font-size: 14px; }

  /* Citation markers */
  .msg-bubble .citation {
    display: inline-block;
    background: var(--accent-glow);
    color: var(--accent);
    border: 1px solid rgba(88,166,255,0.3);
    border-radius: 4px;
    padding: 0 5px;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  .msg-bubble .citation:hover { background: rgba(88,166,255,0.25); }
  .msg-bubble blockquote {
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    margin: 8px 0;
    color: var(--text-dim);
  }

  /* Sources list */
  .sources {
    margin-top: 12px;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    font-size: 13px;
  }
  .sources-title {
    font-weight: 600;
    color: var(--text-dim);
    margin-bottom: 6px;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .source-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 3px 0;
  }
  .source-num {
    flex-shrink: 0;
    background: var(--accent-glow);
    color: var(--accent);
    border-radius: 4px;
    padding: 0 5px;
    font-size: 11px;
    font-weight: 600;
    font-family: var(--mono);
  }
  .source-url {
    color: var(--accent);
    font-size: 13px;
    word-break: break-all;
  }

  /* Thinking / typing indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: fit-content;
    animation: fadeIn 0.2s ease;
  }
  .thinking .dots { display: flex; gap: 4px; }
  .thinking .dots span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite;
  }
  .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
  .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-4px); } }
  .thinking .label {
    font-size: 13px;
    color: var(--text-dim);
  }

  /* === Input Area === */
  .input-area {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 12px 20px;
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    resize: none;
    outline: none;
    min-height: 44px;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }
  .input-area textarea:focus { border-color: var(--accent); }
  .input-area textarea::placeholder { color: var(--text-dim); opacity: 0.6; }
  .input-area button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-family: var(--font);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    white-space: nowrap;
    height: 44px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .input-area button:hover { opacity: 0.9; }
  .input-area button:active { transform: scale(0.97); }
  .input-area button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .input-area button svg { width: 16px; height: 16px; fill: currentColor; }

  /* === Empty State === */
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-dim);
    gap: 12px;
    text-align: center;
    padding: 40px;
  }
  .empty-state .icon { font-size: 48px; opacity: 0.3; }
  .empty-state h2 { font-size: 18px; font-weight: 600; color: var(--text); }
  .empty-state p { font-size: 14px; max-width: 400px; line-height: 1.5; }
  .empty-state .hint {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 16px;
    font-family: var(--mono);
    font-size: 12px;
    margin-top: 8px;
  }

  /* === Error === */
  .msg.error .msg-bubble {
    background: rgba(248,81,73,0.1);
    border: 1px solid rgba(248,81,73,0.3);
    color: var(--red);
  }

  /* === Scroll anchor === */
  .scroll-anchor { height: 1px; }

  /* === Toast notification === */
  .toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 20px;
    font-size: 13px;
    color: var(--text);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    animation: toastIn 0.3s ease;
    z-index: 1000;
    backdrop-filter: blur(8px);
  }
  .toast.success { border-color: var(--green); }
  .toast.error { border-color: var(--red); }
  @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(20px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
</style>
</head>
<body>

<div class="app-layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h3>📋 History</h3>
      <div class="sidebar-actions">
        <button onclick="createNewSession()" title="New Chat">➕</button>
        <button onclick="refreshSessions()" title="Refresh">🔄</button>
      </div>
    </div>
    <div class="sidebar-list" id="sessionList">
      <div class="loading-sessions">Loading sessions...</div>
    </div>
  </div>

  <!-- Main Area -->
  <div class="main-area">
    <!-- Header -->
    <header>
      <h1>
        🔬 ResearchGPT
        <span class="badge">research-gatherer</span>
      </h1>
      <div>
        <span id="statusDot" class="status-dot"></span>
        <span id="statusText" style="font-size:13px;color:var(--text-dim);">Connected</span>
      </div>
    </header>

    <!-- Config Bar -->
    <div class="config-bar">
      <label>
        API Base
        <input type="text" id="apiBase" value="http://localhost:3000" placeholder="http://localhost:3000">
      </label>
      <label>
        API Key
        <input type="text" id="apiKey" value="" placeholder="optional" style="width:160px;">
      </label>
      <label>
        Model
        <input type="text" id="modelName" value="research-assistant" style="width:140px;">
      </label>
      <label class="byok-toggle">
        <span class="key-icon">🔑</span>
        BYOK
        <input type="checkbox" id="byokToggle" onchange="toggleByok()">
      </label>
      <label class="stream-toggle">
        ⚡ Stream
        <input type="checkbox" id="streamToggle" checked>
      </label>
      <button class="save-config-btn" onclick="saveConfig()">💾 Save Config</button>
    </div>

    <!-- BYOK Fields -->
    <div class="byok-fields" id="byokFields">
      <span class="badge-byok">BYOK</span>
      <label>
        LLM URL
        <input type="text" id="byokUrl" value="https://api.openai.com/v1" placeholder="https://api.openai.com/v1" style="width:220px;">
      </label>
      <label>
        API Key
        <input type="password" id="byokKey" value="" placeholder="sk-..." style="width:220px;">
      </label>
      <label>
        Model
        <input type="text" id="byokModel" value="gpt-4o" placeholder="gpt-4o" style="width:150px;">
      </label>
    </div>

    <!-- Chat -->
    <div class="chat-container" id="chatContainer">
      <div class="empty-state" id="emptyState">
        <div class="icon">🔍</div>
        <h2>Research Assistant</h2>
        <p>Ask anything. I'll search across 13+ engines, parse top results, and synthesize a citation-rich answer.</p>
        <div class="hint">Try: "What is DDoS mitigation?"</div>
      </div>
      <div class="scroll-anchor" id="scrollAnchor"></div>
    </div>

    <!-- Input -->
    <div class="input-area">
      <textarea id="inputField" rows="1" placeholder="Ask a research question..." oninput="autoResize(this)"></textarea>
      <button id="sendBtn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        Send
      </button>
    </div>
  </div>
</div>

<script>
// ---- Backend API URL (via Nginx proxy) ----
const API_BASE = '';

// ---- DOM refs ----
const chatContainer = document.getElementById('chatContainer');
const emptyState = document.getElementById('emptyState');
const inputField = document.getElementById('inputField');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');
const scrollAnchor = document.getElementById('scrollAnchor');
const sessionList = document.getElementById('sessionList');

// ---- State ----
let currentSessionId = null;
let isSending = false;
let byokActive = false;
let sessionsCache = [];

// ---- helpers ----
function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function getConfig() {
  return {
    base: document.getElementById('apiBase').value.replace(/\/+$/, ''),
    key: document.getElementById('apiKey').value,
    model: document.getElementById('modelName').value || 'research-assistant',
    stream: document.getElementById('streamToggle').checked,
  };
}

function setStatus(ok, msg) {
  statusDot.className = 'status-dot' + (ok ? '' : ' disconnected');
  statusText.textContent = msg;
}

function showToast(msg, type) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || '');
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}

function toggleByok() {
  const cb = document.getElementById('byokToggle');
  const fields = document.getElementById('byokFields');
  byokActive = cb.checked;
  fields.classList.toggle('active', byokActive);
}

function getByokConfig() {
  return {
    url: document.getElementById('byokUrl').value.replace(/\/+$/, ''),
    key: document.getElementById('byokKey').value,
    model: document.getElementById('byokModel').value || 'gpt-4o',
  };
}

// ---- API calls ----
async function apiRequest(method, path, body) {
  const url = API_BASE + path;
  const options = {
    method,
    headers: { 'Content-Type': 'application/json' },
  };
  if (body !== undefined) {
    options.body = JSON.stringify(body);
  }
  const resp = await fetch(url, options);
  if (!resp.ok) {
    const errText = await resp.text().catch(() => '');
    throw new Error(`API ${resp.status}: ${errText}`);
  }
  return resp.json();
}

// ---- Sessions Management ----
async function refreshSessions() {
  try {
    sessionList.innerHTML = '<div class="loading-sessions">Loading sessions...</div>';
    const data = await apiRequest('GET', '/api/sessions');
    sessionsCache = data.sessions || [];
    renderSessionList();
  } catch (err) {
    sessionList.innerHTML = '<div class="loading-sessions">Failed to load sessions. Is backend running?</div>';
    setStatus(false, 'Backend disconnected');
  }
}

function renderSessionList() {
  if (sessionsCache.length === 0) {
    sessionList.innerHTML = '<div class="loading-sessions">No sessions yet. Start a new chat!</div>';
    return;
  }

  let html = '';
  for (const s of sessionsCache) {
    const id = s._id || s.id;
    const title = s.title || 'Untitled';
    const msgCount = (s.messages && s.messages.length) || 0;
    const time = s.updated_at ? new Date(s.updated_at).toLocaleDateString() : '';
    const activeClass = id === currentSessionId ? 'active' : '';
    html += `
      <div class="session-item ${activeClass}" onclick="loadSession('${id}')">
        <div class="session-title">${escapeHtml(title)}</div>
        <div class="session-meta">
          <span>${msgCount} messages</span>
          <span>${time}</span>
          <button class="delete-btn" onclick="event.stopPropagation(); deleteSession('${id}')">✕</button>
        </div>
      </div>
    `;
  }
  sessionList.innerHTML = html;
}

async function createNewSession() {
  try {
    const data = await apiRequest('POST', '/api/sessions', {
      title: 'New Chat',
      messages: [],
    });
    currentSessionId = data.session_id;
    // Clear chat UI
    document.querySelectorAll('.msg').forEach(el => el.remove());
    emptyState.style.display = 'flex';
    await refreshSessions();
    setStatus(true, 'New session created');
  } catch (err) {
    showToast('Error creating session: ' + err.message, 'error');
  }
}

async function loadSession(sessionId) {
  try {
    const session = await apiRequest('GET', '/api/sessions/' + sessionId);
    currentSessionId = sessionId;
    
    // Clear chat UI
    document.querySelectorAll('.msg').forEach(el => el.remove());
    emptyState.style.display = 'none';
    
    // Render messages
    if (session.messages && session.messages.length > 0) {
      for (const msg of session.messages) {
        addMessage(msg.role, msg.content, false, false);
      }
    } else {
      emptyState.style.display = 'flex';
    }
    
    renderSessionList();
    setStatus(true, 'Session loaded');
  } catch (err) {
    showToast('Error loading session: ' + err.message, 'error');
  }
}

async function deleteSession(sessionId) {
  if (!confirm('Delete this session?')) return;
  try {
    await apiRequest('DELETE', '/api/sessions/' + sessionId);
    if (currentSessionId === sessionId) {
      currentSessionId = null;
      document.querySelectorAll('.msg').forEach(el => el.remove());
      emptyState.style.display = 'flex';
    }
    await refreshSessions();
    showToast('Session deleted', 'success');
  } catch (err) {
    showToast('Error deleting session: ' + err.message, 'error');
  }
}

async function saveMessagesToSession(messages) {
  if (!currentSessionId) return;
  try {
    const title = messages.length > 0 ? messages[0].content.slice(0, 50) + '...' : 'New Chat';
    await apiRequest('PUT', '/api/sessions/' + currentSessionId, {
      title: title,
      messages: messages,
    });
    await refreshSessions();
  } catch (err) {
    console.error('Failed to save messages:', err);
  }
}

// ---- Chat functions ----
function addMessage(role, content, isError, saveToBackend = true) {
  emptyState.style.display = 'none';

  const div = document.createElement('div');
  div.className = 'msg ' + (isError ? 'error' : role);

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'ResearchGPT';
  div.appendChild(label);

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (role === 'assistant' && content) {
    bubble.innerHTML = renderMarkdown(content);
  } else if (role === 'user') {
    bubble.textContent = content;
  } else {
    bubble.textContent = content || '';
  }

  div.appendChild(bubble);
  chatContainer.insertBefore(div, scrollAnchor);
  scrollToBottom();

  return div;
}

function scrollToBottom() {
  scrollAnchor.scrollIntoView({ behavior: 'smooth' });
}

function showThinking() {
  const existing = document.getElementById('thinkingIndicator');
  if (existing) existing.remove();
  emptyState.style.display = 'none';

  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinkingIndicator';
  div.innerHTML = `
    <span class="label">Researching</span>
    <span class="dots"><span></span><span></span><span></span></span>
  `;
  chatContainer.insertBefore(div, scrollAnchor);
  scrollToBottom();
}

function removeThinking() {
  const el = document.getElementById('thinkingIndicator');
  if (el) el.remove();
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

// ---- Markdown renderer ----
function renderMarkdown(text) {
  if (!text) return '';

  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // Code blocks
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) => {
    const langClass = lang ? ` class="language-${lang}"` : '';
    return `<pre${langClass}><code>${code.trim()}</code></pre>`;
  });

  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');

  // Citation markers
  html = html.replace(/\[(\d+)\]/g, '<span class="citation">[$1]</span>');

  // Bold / Italic
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

  // Headings
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Blockquotes
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Unordered lists
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

  // Bare URLs
  html = html.replace(/(?<!href=")(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');

  // Paragraphs
  const blocks = html.split(/\n\n+/);
  if (blocks.length > 1) {
    html = blocks.map(b => {
      const trimmed = b.trim();
      if (!trimmed) return '';
      if (trimmed.startsWith('<h') || trimmed.startsWith('<pre') || trimmed.startsWith('<ul') || trimmed.startsWith('<ol') || trimmed.startsWith('<blockquote')) return trimmed;
      return `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
    }).filter(Boolean).join('\n');
  }

  html = html.replace(/([^>\n])\n([^<\n])/g, '$1<br>$2');

  return html;
}

// ---- Send message ----
async function sendMessage() {
  const text = inputField.value.trim();
  if (!text || isSending) return;

  inputField.value = '';
  autoResize(inputField);
  isSending = true;
  sendBtn.disabled = true;

  // If no session, create one
  if (!currentSessionId) {
    try {
      const data = await apiRequest('POST', '/api/sessions', {
        title: text.slice(0, 50) + '...',
        messages: [],
      });
      currentSessionId = data.session_id;
      await refreshSessions();
    } catch (err) {
      showToast('Error creating session: ' + err.message, 'error');
      isSending = false;
      sendBtn.disabled = false;
      return;
    }
  }

  // Add user message to UI
  addMessage('user', text);
  
  // Save user message
  const userMsg = { role: 'user', content: text, timestamp: new Date().toISOString() };
  try {
    await apiRequest('POST', `/api/sessions/${currentSessionId}/messages`, userMsg);
  } catch (err) {
    console.warn('Failed to save user message:', err);
  }

  showThinking();

  try {
    const config = getConfig();

    if (byokActive) {
      await sendWithByok(text);
    } else {
      await sendWithGatherer(text);
    }
  } catch (err) {
    removeThinking();
    addMessage('assistant', `**Error:** ${err.message}`, true);
    // Save error message
    try {
      await apiRequest('POST', `/api/sessions/${currentSessionId}/messages`, {
        role: 'error', content: err.message, timestamp: new Date().toISOString()
      });
    } catch (_) {}
  }

  isSending = false;
  sendBtn.disabled = false;
  inputField.focus();
  await refreshSessions();
}

async function sendWithGatherer(query) {
  const config = getConfig();

  const headers = { 'Content-Type': 'application/json' };
  if (config.key) headers['X-API-Key'] = config.key;

  if (config.stream) {
    const body = JSON.stringify({
      model: config.model,
      messages: [
        { role: 'system', content: 'You are ResearchGPT, an expert research assistant. Provide well-cited answers.' },
        { role: 'user', content: query }
      ],
      stream: true,
      temperature: 0.3,
      max_tokens: 4096,
    });

    setStatus(true, 'Researching...');

    const resp = await fetch(config.base + '/v1/chat/completions', {
      method: 'POST', headers, body,
    });
    removeThinking();

    if (!resp.ok) {
      const errText = await resp.text().catch(() => '');
      throw new Error(`Research API: ${resp.status} ${errText}`);
    }

    const msgDiv = document.createElement('div');
    msgDiv.className = 'msg assistant';
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'ResearchGPT';
    msgDiv.appendChild(label);
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = '▊';
    msgDiv.appendChild(bubble);
    chatContainer.insertBefore(msgDiv, scrollAnchor);
    scrollToBottom();

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let accumulated = '';
    let buffer = '';

    try {
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';

        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed) continue;
          if (trimmed === 'data: [DONE]') continue;
          if (!trimmed.startsWith('data: ')) continue;

          try {
            const chunk = JSON.parse(trimmed.slice(6));
            const delta = chunk?.choices?.[0]?.delta;
            if (delta?.content) {
              accumulated += delta.content;
              bubble.textContent = accumulated + '▊';
              scrollAnchor.scrollIntoView({ behavior: 'smooth' });
            }
          } catch (_) {}
        }
      }
      bubble.innerHTML = renderMarkdown(accumulated) || '▊';
      scrollToBottom();

      // Save assistant response
      if (accumulated && currentSessionId) {
        await apiRequest('POST', `/api/sessions/${currentSessionId}/messages`, {
          role: 'assistant', content: accumulated, timestamp: new Date().toISOString()
        });
      }
    } catch (err) {
      bubble.textContent = accumulated || 'Connection interrupted.';
    }

    setStatus(true, 'Connected');
    return;
  }

  // Non-streaming
  const body = JSON.stringify({
    model: config.model,
    messages: [
      { role: 'system', content: 'You are ResearchGPT, an expert research assistant. Provide well-cited answers.' },
      { role: 'user', content: query }
    ],
    tools: RESEARCH_TOOLS,
    tool_choice: 'auto',
    temperature: 0.3,
    max_tokens: 4096,
  });

  const resp = await fetch(config.base + '/v1/chat/completions', {
    method: 'POST', headers, body,
  });
  removeThinking();

  if (!resp.ok) {
    const errText = await resp.text().catch(() => '');
    throw new Error(`Research API: ${resp.status} ${errText}`);
  }

  const data = await resp.json();
  const content = data?.choices?.[0]?.message?.content || 'No response.';
  addMessage('assistant', content);

  // Save assistant response
  if (currentSessionId) {
    await apiRequest('POST', `/api/sessions/${currentSessionId}/messages`, {
      role: 'assistant', content: content, timestamp: new Date().toISOString()
    });
  }

  setStatus(true, 'Connected');
}

async function sendWithByok(query) {
  const byok = getByokConfig();
  const config = getConfig();

  setStatus(true, 'Researching via gatherer...');

  const gatherBody = JSON.stringify({
    model: config.model,
    messages: [
      { role: 'system', content: getByokSystemPrompt() },
      { role: 'user', content: query }
    ],
    tools: RESEARCH_TOOLS,
    tool_choice: 'auto',
    temperature: 0.3,
    max_tokens: 4096,
  });
  const gatherHeaders = { 'Content-Type': 'application/json' };
  if (config.key) gatherHeaders['X-API-Key'] = config.key;

  const gatherResp = await fetch(config.base + '/v1/chat/completions', {
    method: 'POST',
    headers: gatherHeaders,
    body: gatherBody,
  });

  if (!gatherResp.ok) {
    throw new Error('Gatherer ' + gatherResp.status);
  }

  const gatherData = await gatherResp.json();
  const assistantMsg = gatherData?.choices?.[0]?.message;
  const toolCalls = assistantMsg?.tool_calls;

  if (toolCalls && toolCalls.length > 0) {
    setStatus(true, 'Synthesizing with ' + byok.model + '...');

    const msgs = [
      { role: 'system', content: getByokSystemPrompt() },
      { role: 'user', content: query },
      assistantMsg,
    ];

    for (const tc of toolCalls) {
      const fn = tc.function;
      const fnArgs = JSON.parse(fn.arguments);
      let result = { error: 'Unknown tool: ' + fn.name };

      try {
        result = await executeToolRemotely(config, fn.name, fnArgs);
      } catch (e) {
        result = { error: e.message };
      }

      msgs.push({
        role: 'tool',
        tool_call_id: tc.id,
        content: JSON.stringify(result).slice(0, 16000),
      });
    }

    const llmResp = await fetch(byok.url + '/chat/completions', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + byok.key,
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: byok.model,
        messages: msgs,
        temperature: 0.3,
        max_tokens: 4096,
      }),
    });

    removeThinking();

    if (!llmResp.ok) {
      throw new Error('LLM ' + llmResp.status);
    }

    const llmData = await llmResp.json();
    const content = llmData?.choices?.[0]?.message?.content || 'No response from LLM.';
    setStatus(true, 'BYOK ' + byok.model);
    addMessage('assistant', content);

    if (currentSessionId) {
      await apiRequest('POST', `/api/sessions/${currentSessionId}/messages`, {
        role: 'assistant', content: content, timestamp: new Date().toISOString()
      });
    }
  } else {
    removeThinking();
    const content = assistantMsg?.content || 'No response.';
    setStatus(true, 'BYOK ' + byok.model);
    addMessage('assistant', content);

    if (currentSessionId) {
      await apiRequest('POST', `/api/sessions/${currentSessionId}/messages`, {
        role: 'assistant', content: content, timestamp: new Date().toISOString()
      });
    }
  }
}

function getByokSystemPrompt() {
  return `You are ResearchGPT, an expert AI research assistant. You have access to powerful research tools.

## Available Tools
- **search**: Search the web across 13+ engines (Google, Bing, Yahoo, etc.)
- **parse_url/parse_urls**: Extract clean content from web pages
- **gather_images**: Find and download quality images
- **deep_research**: Full research pipeline (search + parse + synthesize)

## Research Process
1. Use the **search** tool to find relevant sources
2. Use **parse_urls** to extract content from top results
3. Synthesize findings with inline citations [1], [2], [3]
4. List all sources at the end

## Citation Rules
- Every factual claim MUST have a citation
- Use inline markers: [1], [2], [3] matching source numbers
- End with "## Sources" section listing all URLs
- Never fabricate information not in sources

Be thorough, accurate, and well-cited.`;
}

async function executeToolRemotely(config, toolName, args) {
  const headers = {};
  if (config.key) headers['X-API-Key'] = config.key;

  switch (toolName) {
    case 'search': {
      const resp = await fetch(config.base + '/v1/search?q=' + encodeURIComponent(args.query), { headers });
      if (!resp.ok) throw new Error('Search failed');
      return resp.json();
    }
    case 'parse_url': {
      const resp = await fetch(config.base + '/v1/parse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...headers },
        body: JSON.stringify({ urls: [args.url], include_content: true }),
      });
      if (!resp.ok) throw new Error('Parse failed');
      return resp.json();
    }
    case 'parse_urls': {
      const resp = await fetch(config.base + '/v1/parse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...headers },
        body: JSON.stringify({ urls: args.urls, include_content: true }),
      });
      if (!resp.ok) throw new Error('Parse failed');
      return resp.json();
    }
    case 'gather_images': {
      const resp = await fetch(config.base + '/v1/images', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...headers },
        body: JSON.stringify({ keywords: args.keywords, min_size: args.min_size || 300 }),
      });
      if (!resp.ok) throw new Error('Images failed');
      return resp.json();
    }
    case 'deep_research': {
      const resp = await fetch(config.base + '/v1/research', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', ...headers },
        body: JSON.stringify({ query: args.query, academic: args.academic_only || false, max_parse: args.max_parse || 0 }),
      });
      if (!resp.ok) throw new Error('Deep research failed');
      return resp.json();
    }
    default:
      throw new Error('Unknown tool: ' + toolName);
  }
}

// ---- Health check ----

    if (data.status === 'healthy') {

    } else {
      setStatus(false, 'Backend: ' + (data.mongodb || 'unhealthy'));

    setStatus(false, 'Backend disconnected');
  }
}
