# ===================================================================
# Research Gatherer — Docker Compose
# ===================================================================
#                        RESEARCH GATHERER ECOSYSTEM
# ┌─────────────────────────────────────────────────────────────────┐
# │  research-gatherer (port 8000)                                 │
# │  ┌──────────────────────────────────────────────────────────┐  │
# │  │  FastAPI Server               ┌──────────────────────┐  │  │
# │  │  /v1/chat/completions ─────────▶  LLM Client          │  │  │
# │  │  /v1/search           ─────┐  │  (httpx → provider)  │  │  │
# │  │  /v1/research         ───┐ │  └───────┬──────────────┘  │  │
# │  │                          │ │          │                  │  │
# │  │  ┌─────────────────────┐ │ │          │                  │  │
# │  │  │ Multi-Engine Search │◀┘ │          │                  │  │
# │  │  │ Google, Bing, Yahoo │   │          │                  │  │
# │  │  │ DuckDuckGo, Yandex  │   │          │                  │  │
# │  │  │ Naver, Mojeek, ...  │   │          │                  │  │
# │  │  └─────────────────────┘   │          │                  │  │
# │  │  ┌─────────────────────┐   │          │                  │  │
# │  │  │ Jina AI Parser      │◀──┘          │                  │  │
# │  │  │ (URL → Markdown)    │              │                  │  │
# │  │  └─────────────────────┘              │                  │  │
# │  └───────────────────────────────────────┼──────────────────┘  │
# │                                          │                      │
# │             External LLM Provider ◄───────┘                     │
# │             (OpenAI / Ollama / Groq / DeepSeek / vLLM / ...)    │
# └─────────────────────────────────────────────────────────────────┘
#
# Usage:
#   docker compose up -d                       # Start all services
#   docker compose up -d research-gatherer     # Just the API server
#   docker compose logs -f                     # Follow logs
#   docker compose down                        # Stop everything
#   docker compose run --rm research-gatherer  # One-off command
# ===================================================================

services:
  # =================================================================
  # Research Gatherer API Server
  # =================================================================
  research-gatherer:
    build:
      context: .
      dockerfile: Dockerfile
    image: research-gatherer:latest
    container_name: research-gatherer
    hostname: research-gatherer
    restart: unless-stopped

    ports:
      - "${RESEARCH_PORT:-8000}:8000"

    env_file:
      - .env

    environment:
      # Override host for container environment
      - RESEARCH_HOST=0.0.0.0
      # LLM defaults (from .env or environment)
      - LLM_API_BASE=${LLM_API_BASE:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o}
      # Research behavior defaults
      - RESEARCH_API_KEY=${RESEARCH_API_KEY:-}
      - RESEARCH_OUTPUT_DIR=/app/research_output
      - RESEARCH_PARSE_WORKERS=${RESEARCH_PARSE_WORKERS:-4}
      - RESEARCH_JINA_TIMEOUT=${RESEARCH_JINA_TIMEOUT:-30}
      - RESEARCH_RATE_LIMIT=${RESEARCH_RATE_LIMIT:-0.5}
      # Selenium/Chromium
      - CHROME_BIN=/usr/bin/chromium
      - CHROMEDRIVER_PATH=/usr/bin/chromedriver
      - DISPLAY=""

    volumes:
      # Persist research output between restarts
      - research_data:/app/research_output
      # Cookie persistence for search engine sessions
      - cookies:/app/cookie
      # Mount .env explicitly (already loaded via env_file above)
      # - ./.env:/app/.env:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    networks:
      - research-net

    # Resource limits (adjust based on your needs)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"


  # =================================================================
  # (Optional) Local LLM — Ollama
  # Uncomment the lines below to run a local LLM alongside the server.
  # Set LLM_API_BASE=http://ollama:11434/v1 in .env
  # Set LLM_MODEL=llama3.2 or llama3.1
  # =================================================================
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: research-ollama
  #   hostname: ollama
  #   restart: unless-stopped
  #
  #   ports:
  #     - "11434:11434"
  #
  #   volumes:
  #     - ollama_data:/root/.ollama
  #
  #   deploy:
  #     resources:
  #       limits:
  #         cpus: '4'
  #         memory: 8G
  #       reservations:
  #         cpus: '2'
  #         memory: 4G
  #
  #   networks:
  #     - research-net
  #
  #   healthcheck:
  #     test: ["CMD", "ollama", "list"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3
  #     start_period: 60s
  #
  #   # Uncomment to auto-pull a model on first start:
  #   # command: serve &
  #   #   sleep 5 &&
  #   #   ollama pull llama3.2
  #
  #
  # =================================================================
  # (Optional) Open WebUI — Chat interface for the LLM
  # Uncomment to add a ChatGPT-like UI connected to Ollama
  # =================================================================
  # open-webui:
  #   image: ghcr.io/open-webui/open-webui:main
  #   container_name: research-webui
  #   restart: unless-stopped
  #
  #   ports:
  #     - "3000:8080"
  #
  #   volumes:
  #     - webui_data:/app/backend/data
  #
  #   environment:
  #     - OLLAMA_BASE_URL=http://ollama:11434
  #
  #   networks:
  #     - research-net
  #
  #   depends_on:
  #     - ollama


# =================================================================
# Volumes (persistent data)
# =================================================================
volumes:
  research_data:
    name: research-gatherer-data
    driver: local

  cookies:
    name: research-gatherer-cookies
    driver: local

  # ollama_data:
  #   name: research-ollama-models
  #   driver: local

  # webui_data:
  #   name: research-webui-data
  #   driver: local


# =================================================================
# Networks
# =================================================================
networks:
  research-net:
    name: research-network
    driver: bridge
